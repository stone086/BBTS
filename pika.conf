# --- 基础信息 / Basic Information ---
local app_id="pika"
local app_name="Pika"
local app_text="高性能的 Key-Value 存储系统，完全兼容 Redis 协议，适合大数据量存储。"
local app_url="https://github.com/OpenAtomFoundation/pika"
local docker_name="pika-server"
local docker_port="9221"
local app_size="2"

# --- 核心逻辑 / Core Logic ---
docker_app_install() {
    # 1. 环境准备
    local base_dir="/home/docker/pika"
    mkdir -p "$base_dir/data" "$base_dir/conf" && cd "$base_dir"

    # 2. 写入 Docker Compose 配置文件
    cat <<DOCKEREOF > docker-compose.yml
services:
  pika:
    image: pikadb/pika:latest
    container_name: pika-server
    ports:
      - "${docker_port}:9221"
    volumes:
      - ./data:/pika/data
    restart: unless-stopped
DOCKEREOF

    # 3. 启动容器
    echo "正在拉取镜像并启动 Pika..."
    docker compose up -d

    echo "安装完成 / Install Complete"
    check_docker_app_ip
}

docker_app_update() {
    cd /home/docker/pika
    echo "正在更新 Pika 镜像..."
    docker compose pull
    docker compose up -d
    echo "更新完成 / Update Complete"
}

docker_app_uninstall() {
    cd /home/docker/pika
    echo "正在卸载 Pika..."
    docker compose down --rmi all
    rm -rf /home/docker/pika
    echo "卸载完成 / Uninstall Complete"
}

# --- 注册 / Registration ---
docker_app_plus
