<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BBTS Portal</title>
  <style>
    :root {
      --bg: #f7f7f2;
      --panel: #fffdf7;
      --text: #26231d;
      --muted: #6b665a;
      --border: #e6dccd;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Georgia", "Times New Roman", serif;
      background: radial-gradient(circle at 0 0, #fff7e9 0%, var(--bg) 55%);
      color: var(--text);
    }
    .wrap {
      max-width: 920px;
      margin: 0 auto;
      padding: 24px 16px 48px;
    }
    h1 { margin: 0 0 8px; font-size: 30px; }
    p { margin: 0; color: var(--muted); }
    .grid {
      margin-top: 24px;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
      gap: 14px;
    }
    .card {
      display: block;
      text-decoration: none;
      color: inherit;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 16px;
      transition: transform .15s ease, box-shadow .15s ease;
    }
    .card:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(75, 57, 32, 0.08);
    }
    .card h2 {
      margin: 0 0 6px;
      font-size: 20px;
    }
    .tag {
      display: inline-block;
      margin-top: 8px;
      padding: 3px 8px;
      border-radius: 999px;
      background: #f4e9d5;
      color: #764a24;
      font-size: 12px;
    }
  </style>
</head>
<body>
  <main class="wrap">
    <h1>BBTS Portal</h1>
    <p>This is the cloud section entry point. Add more tool collections here over time.</p>
    <section class="grid">
      <a class="card" href="./bible-tools/index.html">
        <h2>Bible Text Tools</h2>
        <p>Online text processing for Bible content: cleanup, formatting, and reference extraction.</p>
        <span class="tag">Live</span>
      </a>
    </section>
  </main>
</body>
</html>
