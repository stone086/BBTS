# MLflow Configuration for kejilion/apps
# Official: https://github.com/mlflow/mlflow
# Open source AI/ML platform for experiment tracking, model management, and LLM observability

local app_id="mlflow"
local app_name="MLflow"
local app_text="开源AI/ML开发平台，支持实验追踪、模型管理、LLM可观测性与评估"
local app_url="https://github.com/mlflow/mlflow"
local docker_name="mlflow"
local docker_port="5000"
local app_size="2"

docker_app_install() {
    local app_dir="/home/docker/${app_name}"
    mkdir -p "${app_dir}/data" "${app_dir}/artifacts"
    cd "${app_dir}" || return 1

    cat <<EOF > docker-compose.yml
services:
  mlflow:
    image: ghcr.io/mlflow/mlflow:v3.10.0-full
    container_name: mlflow
    command: >
      mlflow server
      --host 0.0.0.0
      --port 5000
      --backend-store-uri sqlite:///mlflow/data/mlflow.db
      --default-artifact-root /mlflow/artifacts
    ports:
      - "5000:5000"
    volumes:
      - ${app_dir}/data:/mlflow/data
      - ${app_dir}/artifacts:/mlflow/artifacts
    environment:
      - MLFLOW_TRACKING_URI=sqlite:///mlflow/data/mlflow.db
    restart: unless-stopped
EOF

    # 替换默认端口为用户自定义端口
    sed -i "s/\"5000:5000\"/\"${docker_port}:5000\"/g" docker-compose.yml

    # 启动容器
    docker compose up -d

    echo "MLflow 已部署完成！"
    check_docker_app_ip
    echo "数据存储：${app_dir}/data（SQLite 数据库）"
    echo "模型产物：${app_dir}/artifacts"
}

docker_app_update() {
    local app_dir="/home/docker/${app_name}"
    cd "${app_dir}" || return 1
    docker compose pull
    docker compose up -d
    echo "MLflow 已更新至最新版本。"
}

docker_app_uninstall() {
    local app_dir="/home/docker/${app_name}"
    cd "${app_dir}" || return 1
    docker compose down --rmi all
    rm -rf "${app_dir}"
    echo "MLflow 已彻底卸载，包括所有数据与模型产物。"
}

# 注册到平台
docker_app_plus
